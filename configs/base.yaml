data:
  raw_data_path: data/raw/accepted_2007_to_2018Q4.csv.gz
  sample_frac: 0.2
  chunk_size: 100000
  random_state: 42
  target_column: default
  test_size: 0.2

model:
  cv_folds: 3
  scoring: roc_auc
  logistic_regression_grid:
    classifier__C: [0.1, 1.0, 10.0]
  xgboost_grid:
    classifier__max_depth: [3, 5]
    classifier__learning_rate: [0.05, 0.1]
    classifier__n_estimators: [100, 200]

tracking:
  experiment_name: RiskSense-Credit-Risk
  tracking_uri: sqlite:///mlflow.db
  model_registry_name: RiskSenseCreditRiskModel

explainability:
  enabled: true
  sample_size: 100

paths:
  model_dir: models
  report_dir: reports
  metrics_path: reports/metrics.json
  metrics_summary_path: reports/summary_metrics.json
  comparison_table_path: reports/model_comparison.csv
  prediction_example_path: reports/sample_predictions.csv
