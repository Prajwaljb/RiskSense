data:
  sample_frac: 0.2
  test_size: 0.2
  random_state: 42

model:
  cv_folds: 3
  scoring: roc_auc
  logistic_regression_grid:
    classifier__C: [0.1, 1.0, 10.0]
  xgboost_grid:
    classifier__max_depth: [3, 5]
    classifier__learning_rate: [0.05, 0.1]
    classifier__n_estimators: [100, 200]

explainability:
  enabled: true
  sample_size: 100
